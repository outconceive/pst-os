[toolchain]
# Nightly is required for:
#   - build-std (compiling core/alloc for no_std targets)
#   - inline assembly in kernel-adjacent code
#   - various unstable features needed for bare-metal Rust
channel = "nightly"

components = [
    "rust-src",           # Required for -Zbuild-std (building core/alloc from source)
    "llvm-tools-preview", # Required for cargo-binutils (objcopy, nm, size)
    "rustfmt",
    "clippy",
]

targets = [
    "x86_64-unknown-none",   # Primary target: bare-metal x86_64
    "aarch64-unknown-none",  # Secondary target: bare-metal ARM64
]
